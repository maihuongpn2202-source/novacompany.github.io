<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tent Defender</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="menu">

<h1>🏕 Tent Defender</h1>

<p>Protect your tent from dangerous weather.</p>

<button id="playBtn">PLAY</button>

</div>


<div id="hud">

<div class="bar">

Safety

<div class="fill" id="safetyBar"></div>

</div>

<div class="bar">

Comfort

<div class="fill green" id="comfortBar"></div>

</div>

<div class="bar">

Battery

<div class="fill yellow" id="batteryBar"></div>

</div>

</div>


<canvas id="gameCanvas"></canvas>


<div id="controls">

<button id="waterproofBtn">

💧 Waterproof

</button>

<button id="stakesBtn">

🪵 Strong Stakes

</button>

<button id="fanBtn">

🌀 Solar Fan

</button>

</div>


<script src="game.js"></script>

</body>

</html>
